<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Saba-i">
    <meta name="theme-color" content="#4c9fff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>สบาย Saba-i Booking Board</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

    <!-- html2canvas is lazy-loaded on demand when capture button is clicked -->

    <link rel="stylesheet" href="styles.css?v=20260405">
    <link rel="preload" href="config.js" as="script">
    <link rel="preload" href="app.js" as="script">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-compact">
                <h1 class="app-title">Saba-i Booking Board</h1>
                
                <div class="header-controls">
                    <div class="date-nav">
                        <button id="prevDay" class="nav-btn">‹</button>
                        <span id="selectedDate" class="current-date">Loading...</span>
                        <button id="nextDay" class="nav-btn">›</button>
                        <button id="todayBtn" class="today-btn">วันนี้</button>
                    </div>
                    
                    <span id="appVersion" class="app-version"></span>
                    <button id="notifyBtn" class="capture-btn" title="เปิดการแจ้งเตือน">🔔</button>
                    <button id="captureBtn" class="capture-btn">📷</button>
                    <button id="settingsBtn" class="settings-btn">⚙️</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Loading State -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="skeleton-calendar">
                    <div class="skeleton-header-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-therapist-col"></div>
                        <div class="skeleton-cell skeleton-therapist-col"></div>
                        <div class="skeleton-cell skeleton-therapist-col"></div>
                    </div>
                    <div class="skeleton-body-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                    </div>
                    <div class="skeleton-body-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                    </div>
                    <div class="skeleton-body-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                    </div>
                    <div class="skeleton-body-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col skeleton-filled"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                    </div>
                    <div class="skeleton-body-row">
                        <div class="skeleton-cell skeleton-time-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                        <div class="skeleton-cell skeleton-slot-col"></div>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message hidden">
                <span class="error-text"></span>
                <button id="retryButton" class="retry-btn">ลองใหม่</button>
            </div>

            <!-- Calendar Grid -->
            <div id="calendarContainer" class="calendar-container">
                <!-- Scrollable Calendar with Headers -->
                <div class="calendar-scroll">
                    <div id="calendarWithHeaders" class="calendar-with-headers">
                        <!-- Headers will be inserted as first row by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- PWA Install Banner (shows only in Safari, not when already installed) -->
        <div id="installBanner" style="display:none;">
            <div class="install-banner">
                <div class="install-banner-text">
                    <strong>ติดตั้งแอป Saba-i</strong>
                    <span>เพิ่มลงหน้าจอหลักเพื่อรับการแจ้งเตือน</span>
                </div>
                <div class="install-banner-steps">
                    <span>กดปุ่ม</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="vertical-align:middle;">
                        <rect x="4" y="7" width="12" height="10" rx="1.5" stroke="#007AFF" stroke-width="1.5" fill="none"/>
                        <path d="M10 2v9M7 5l3-3 3 3" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>ด้านล่าง แล้วเลือก <strong>"เพิ่มไปยังหน้าจอโฮม"</strong></span>
                </div>
                <button id="dismissInstall" class="install-banner-close">เข้าใจแล้ว</button>
            </div>
        </div>

        <!-- Booking Modal -->
        <div id="bookingModalOverlay" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">จองเวลา</h3>
                    <button type="button" id="closeBookingBtn" class="close-btn">×</button>
                </div>

                <div class="modal-scroll">
                    <form id="bookingForm">
                        <div id="bookingErrorMessage" class="booking-error" style="display: none;"></div>

                        <!-- หมอนวด -->
                        <div class="form-group">
                            <label for="therapistId">หมอนวด</label>
                            <select id="therapistId" name="therapistId" class="form-input" required>
                                <!-- populated by JS -->
                            </select>
                        </div>

                        <!-- เวลาเริ่ม + ระยะเวลา (2 columns) -->
                        <div class="form-row-2col">
                            <div class="form-group">
                                <label for="startTime">เริ่มเวลา</label>
                                <select id="startTime" name="startTime" class="form-input" required>
                                    <!-- populated by JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="duration">ระยะเวลา</label>
                                <select id="duration" name="duration" class="form-input" required>
                                    <option value="30">30 นาที</option>
                                    <option value="60" selected>1 ชม.</option>
                                    <option value="90">1.5 ชม.</option>
                                    <option value="120">2 ชม.</option>
                                    <option value="180">3 ชม.</option>
                                </select>
                            </div>
                        </div>
                        <!-- endTime hidden input + badge -->
                        <input id="endTime" name="endTime" type="hidden">
                        <div class="end-time-display">สิ้นสุด: <strong id="endTimeBadge">--:--</strong></div>

                        <!-- บริการ -->
                        <div class="form-group">
                            <label for="serviceId">บริการ</label>
                            <select id="serviceId" name="serviceId" class="form-input">
                                <option value="">ไม่ระบุบริการ</option>
                                <!-- populated by JS -->
                            </select>
                        </div>

                        <!-- ส่วนลด + ช่องทางชำระเงิน (2 columns) -->
                        <div class="form-row-2col">
                            <div class="form-group">
                                <label for="discount">ส่วนลด</label>
                                <select id="discount" name="discount" class="form-input">
                                    <option value="0">0%</option>
                                    <option value="10">10%</option>
                                    <option value="15">15%</option>
                                    <option value="20">20%</option>
                                    <option value="50">50%</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="paymentMethod">ชำระเงิน</label>
                                <select id="paymentMethod" name="paymentMethod" class="form-input">
                                    <option value="">ไม่ระบุ</option>
                                    <option value="kbank">กสิกร # 213-1-15671-8</option>
                                    <option value="scb">ไทยพาณิชย์ # 316-4-22005-3</option>
                                    <option value="cash">สด</option>
                                </select>
                            </div>
                        </div>

                        <!-- ค่ามือหมอ -->
                        <div class="form-group">
                            <label for="therapistFee">ค่ามือหมอ (฿)</label>
                            <input id="therapistFee" name="therapistFee" type="number" inputmode="decimal" class="form-input" min="0" step="50" placeholder="0">
                        </div>

                        <!-- หมายเหตุ -->
                        <div class="form-group">
                            <label for="note">หมายเหตุ</label>
                            <textarea id="note" name="note" class="form-input" rows="2"></textarea>
                        </div>
                    </form>
                </div>

                <!-- Price summary bar -->
                <div id="priceSummary" class="price-summary" style="display: none;">
                    <span class="price-summary-label">ราคารวม</span>
                    <span id="priceSummaryText" class="price-summary-value">--</span>
                </div>

                <!-- Footer (sticky, outside scroll area) -->
                <div class="modal-footer">
                    <button type="button" id="cancelBooking" class="btn btn-secondary">ยกเลิก</button>
                    <button type="button" id="deleteBooking" class="btn btn-danger" style="display: none;">ลบ</button>
                    <button type="button" id="saveBooking" class="btn btn-primary">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Global error handler for debugging
        window.addEventListener('error', function(e) {
            console.error('🚨 Global JavaScript Error:', e.error);
            console.error('🔍 Error details:', {
                message: e.message,
                filename: e.filename,
                line: e.lineno,
                column: e.colno
            });
            
            // Show user-friendly error message
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.querySelector('.error-text');
            if (errorEl && errorText) {
                errorText.textContent = 'เกิดข้อผิดพลาดในการโหลดแอป: ' + e.message;
                errorEl.classList.remove('hidden');
            }
        });
        
        // Check if all required scripts are loaded before initializing app
        function checkDependencies() {
            const missing = [];
            
            if (typeof firebase === 'undefined') missing.push('Firebase');
            if (typeof CONFIG === 'undefined') missing.push('CONFIG');
            if (typeof db === 'undefined') missing.push('Database');
            if (typeof SabaiUtils === 'undefined') missing.push('SabaiUtils');
            if (typeof SabaiDataService === 'undefined') missing.push('SabaiDataService');
            if (typeof SabaiCalendarRenderer === 'undefined') missing.push('SabaiCalendarRenderer');
            if (typeof SabaiBookingManager === 'undefined') missing.push('SabaiBookingManager');
            
            if (missing.length > 0) {
                const error = `Missing dependencies: ${missing.join(', ')}`;
                console.error('❌ Dependency check failed:', error);
                
                const errorEl = document.getElementById('errorMessage');
                const errorText = document.querySelector('.error-text');
                if (errorEl && errorText) {
                    errorText.textContent = 'ไม่สามารถโหลดไฟล์ที่จำเป็นได้: ' + missing.join(', ');
                    errorEl.classList.remove('hidden');
                }
                return false;
            }
            
            console.log('✅ All dependencies loaded successfully');
            return true;
        }
        
        // Wait for DOM and check dependencies
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🌟 DOM Content Loaded - Starting Saba-i Booking Board...');
            
            if (checkDependencies()) {
                try {
                    window.app = new SabaiBookingBoard();
                } catch (error) {
                    console.error('❌ Failed to initialize SabaiBookingBoard:', error);
                    
                    const errorEl = document.getElementById('errorMessage');
                    const errorText = document.querySelector('.error-text');
                    if (errorEl && errorText) {
                        errorText.textContent = 'ไม่สามารถเริ่มต้นแอปพลิเคชันได้: ' + error.message;
                        errorEl.classList.remove('hidden');
                    }
                }
            }
        });
    </script>
    <script src="config.js?v=20260410"></script>
    <script src="utils.js?v=20260410"></script>
    <script src="dataService.js?v=20260410"></script>
    <script src="calendarRenderer.js?v=20260410"></script>
    <script src="bookingManager.js?v=20260410"></script>
    <script src="dragDropHandler.js?v=20260412"></script>
    <script src="fcm.js?v=20260410"></script>
    <script src="app.js?v=20260412"></script>
    <script src="init-sample-data.js?v=20260410"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>จัดการระบบ - Saba-i Booking Board</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <button id="backBtn" class="nav-btn">‹ กลับ</button>
                <h1 class="app-title">จัดการระบบ</h1>
                <div class="placeholder"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content settings-page">
            <!-- Loading State -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner">Loading...</div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message hidden">
                <span class="error-text"></span>
                <button id="retryButton" class="retry-btn">ลองใหม่</button>
            </div>

            <!-- Settings Content -->
            <div id="settingsContainer" class="settings-container">
                <!-- Settings Tabs -->
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="therapists">จัดการหมอนวด</button>
                    <button class="tab-btn" data-tab="services">จัดการบริการ</button>
                </div>

                <!-- Therapists Tab -->
                <div id="therapistsTab" class="tab-content active">
                    <!-- Therapist List Section -->
                    <div class="settings-section">
                        <h4>รายการหมอนวด</h4>
                        <div id="therapistList" class="therapist-list">
                            <!-- Therapist items will be populated by JavaScript -->
                        </div>
                    </div>

                    <!-- Add Therapist Section -->
                    <div class="settings-section">
                        <h4>เพิ่มหมอนวดใหม่</h4>
                        <form id="addTherapistForm" class="add-therapist-form">
                            <div class="form-row">
                                <input type="text" id="therapistName" class="form-input" placeholder="ชื่อหมอนวด" required>
                                <input type="color" id="therapistColor" class="color-input" value="#4c9fff" title="สีแสดงผล">
                                <button type="submit" class="btn btn-primary">เพิ่ม</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Services Tab -->
                <div id="servicesTab" class="tab-content hidden">
                    <!-- Service List Section -->
                    <div class="settings-section">
                        <h4>รายการบริการ</h4>
                        <div style="margin-bottom: 15px;">
                            <button id="initializeServices" class="btn btn-secondary" style="margin-right: 10px;">สร้างข้อมูลบริการเริ่มต้น</button>
                            <button id="migratePatchTherapistFees" class="btn btn-primary">เติมค่ามือในการจองเก่า</button>
                        </div>
                        <div id="serviceList" class="service-list">
                            <!-- Service items will be populated by JavaScript -->
                        </div>
                    </div>

                    <!-- Add Service Section -->
                    <div class="settings-section">
                        <h4>เพิ่มบริการใหม่</h4>
                        <form id="addServiceForm" class="add-service-form">
                            <div class="form-row">
                                <input type="text" id="serviceName" class="form-input" placeholder="ชื่อบริการ" required>
                                <select id="serviceCategory" class="form-input" required>
                                    <option value="">เลือกประเภท</option>
                                    <option value="traditional">นวดแผนไทย</option>
                                    <option value="therapeutic">นวดเพื่อการรักษา</option>
                                    <option value="aroma">อโรมาเทอราปี</option>
                                    <option value="spa">สปา & ผิวพรรณ</option>
                                    <option value="combination">บริการผสมผสาน</option>
                                </select>
                                <button type="submit" class="btn btn-primary">เพิ่ม</button>
                            </div>
                            <div id="serviceDurations" class="duration-inputs">
                                <h5>ระยะเวลา ราคา และค่ามือ</h5>
                                <div class="duration-row">
                                    <select class="duration-select">
                                        <option value="30">30 นาที</option>
                                        <option value="60">60 นาที</option>
                                        <option value="90">90 นาที</option>
                                        <option value="120">120 นาที</option>
                                    </select>
                                    <input type="number" class="price-input" placeholder="ราคา (บาท)" min="0">
                                    <input type="number" class="therapist-fee-input" placeholder="ค่ามือ (บาท)" min="0">
                                    <button type="button" class="btn-remove-duration">×</button>
                                </div>
                                <button type="button" id="addDuration" class="btn btn-secondary">+ เพิ่มระยะเวลา</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <!-- Edit Service Modal -->
        <div id="editServiceModal" class="modal" style="display: none;">
            <div class="modal-content service-modal">
                <div class="modal-header">
                    <h3 id="editServiceModalTitle">แก้ไขบริการ</h3>
                    <button type="button" id="closeEditServiceModal" class="close-btn">×</button>
                </div>
                <form id="editServiceForm" class="modal-body">
                    <div class="form-group">
                        <label for="editServiceName">ชื่อบริการ:</label>
                        <input type="text" id="editServiceName" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editServiceCategory">ประเภทบริการ:</label>
                        <select id="editServiceCategory" class="form-input" required>
                            <option value="traditional">นวดแผนไทย</option>
                            <option value="therapeutic">นวดเพื่อการรักษา</option>
                            <option value="aroma">อโรมาเทอราปี</option>
                            <option value="spa">สปา & ผิวพรรณ</option>
                            <option value="combination">บริการผสมผสาน</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>ระยะเวลาและราคา:</label>
                        <div id="editServiceDurations" class="duration-inputs">
                            <!-- Duration rows will be populated by JavaScript -->
                        </div>
                        <button type="button" id="addEditDuration" class="btn btn-secondary">+ เพิ่มระยะเวลา</button>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" id="cancelEditService" class="btn btn-secondary">ยกเลิก</button>
                        <button type="submit" class="btn btn-primary">บันทึกการเปลี่ยนแปลง</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
                                        <option value="60">60 นาที</option>
                                        <option value="90">90 นาที</option>
                                        <option value="120">120 นาที</option>
                                    </select>
                                    <input type="number" class="price-input" placeholder="ราคา (บาท)" min="0">
                                    <button type="button" class="btn-remove-duration">×</button>
                                </div>
                                <button type="button" id="addDuration" class="btn btn-secondary">+ เพิ่มระยะเวลา</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="config.js"></script>
    <script src="settings.js"></script>
</body>
</html>

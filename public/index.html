<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>สบาย Saba-i Booking Board</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- html2canvas for screenshot functionality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1 class="app-title">Saba-i Booking Board 
                    <span id="liveIndicator" class="live-indicator">🔴 LIVE</span>
                </h1>
                <button id="settingsBtn" class="settings-btn">⚙️ จัดการ</button>
            </div>
            <div class="date-nav">
                <button id="prevDay" class="nav-btn">‹ ก่อนหน้า</button>
                <span id="selectedDate" class="current-date">Loading...</span>
                <button id="nextDay" class="nav-btn">ถัดไป ›</button>
                <button id="captureBtn" class="capture-btn">📷 บันทึกตาราง</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Loading State -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner">Loading...</div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message hidden">
                <span class="error-text"></span>
                <button id="retryButton" class="retry-btn">ลองใหม่</button>
            </div>

            <!-- Calendar Grid -->
            <div id="calendarContainer" class="calendar-container">
                <!-- Scrollable Calendar with Headers -->
                <div class="calendar-scroll">
                    <div id="calendarWithHeaders" class="calendar-with-headers">
                        <!-- Headers will be inserted as first row by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Booking Modal -->
        <div id="bookingModalOverlay" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">จองเวลา</h3>
                    <button type="button" id="cancelBooking" class="close-btn">×</button>
                </div>
                <form id="bookingForm" class="modal-body">
                    <div id="errorMessage" class="error-message" style="display: none; color: red; margin-bottom: 10px;"></div>
                    
                    <div class="form-group">
                        <label for="therapistId">หมอนวด:</label>
                        <select id="therapistId" name="therapistId" class="form-input" required>
                            <!-- Therapist options will be populated by JavaScript -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="startTime">เริ่มเวลา:</label>
                        <select id="startTime" name="startTime" class="form-input" required>
                            <!-- Time options will be populated by JavaScript -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="duration">ระยะเวลา:</label>
                        <select id="duration" name="duration" class="form-input" required>
                            <option value="30">30 นาที</option>
                            <option value="60" selected>1 ชั่วโมง</option>
                            <option value="90">1.5 ชั่วโมง</option>
                            <option value="120">2 ชั่วโมง</option>
                            <option value="180">3 ชั่วโมง</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="endTime">สิ้นสุดเวลา:</label>
                        <input id="endTime" name="endTime" class="form-input" readonly>
                    </div>

                    <div class="form-group">
                        <label for="serviceId">บริการ (ถ้ามี):</label>
                        <select id="serviceId" name="serviceId" class="form-input">
                            <option value="">ไม่ระบุบริการ</option>
                            <!-- Service options will be populated by JavaScript -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="discount">ลดราคา:</label>
                        <select id="discount" name="discount" class="form-input">
                            <option value="0">0%</option>
                            <option value="10">10%</option>
                            <option value="15">15%</option>
                            <option value="20">20%</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="therapistFee">ค่ามือหมอ:</label>
                        <input id="therapistFee" name="therapistFee" type="number" class="form-input" min="0" step="50" placeholder="กรอกค่ามือหมอ">
                    </div>

                    <div class="form-group">
                        <label for="paymentMethod">ช่องทางชำระเงิน (ถ้ามี):</label>
                        <select id="paymentMethod" name="paymentMethod" class="form-input">
                            <option value="">ไม่ระบุ</option>
                            <option value="transfer">โอน</option>
                            <option value="cash">สด</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="note">หมายเหตุ (ถ้ามี):</label>
                        <textarea id="note" name="note" class="form-input" rows="3"></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="button" id="cancelBooking" class="btn btn-secondary">ยกเลิก</button>
                        <button type="button" id="deleteBooking" class="btn btn-danger" style="display: none;">ลบ</button>
                        <button type="submit" id="saveBooking" class="btn btn-primary">บันทึก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Global error handler for debugging
        window.addEventListener('error', function(e) {
            console.error('🚨 Global JavaScript Error:', e.error);
            console.error('🔍 Error details:', {
                message: e.message,
                filename: e.filename,
                line: e.lineno,
                column: e.colno
            });
            
            // Show user-friendly error message
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.querySelector('.error-text');
            if (errorEl && errorText) {
                errorText.textContent = 'เกิดข้อผิดพลาดในการโหลดแอป: ' + e.message;
                errorEl.classList.remove('hidden');
            }
        });
        
        // Check if all required scripts are loaded before initializing app
        function checkDependencies() {
            const missing = [];
            
            if (typeof firebase === 'undefined') missing.push('Firebase');
            if (typeof CONFIG === 'undefined') missing.push('CONFIG');
            if (typeof db === 'undefined') missing.push('Database');
            if (typeof SabaiUtils === 'undefined') missing.push('SabaiUtils');
            if (typeof SabaiDataService === 'undefined') missing.push('SabaiDataService');
            if (typeof SabaiCalendarRenderer === 'undefined') missing.push('SabaiCalendarRenderer');
            if (typeof SabaiBookingManager === 'undefined') missing.push('SabaiBookingManager');
            
            if (missing.length > 0) {
                const error = `Missing dependencies: ${missing.join(', ')}`;
                console.error('❌ Dependency check failed:', error);
                
                const errorEl = document.getElementById('errorMessage');
                const errorText = document.querySelector('.error-text');
                if (errorEl && errorText) {
                    errorText.textContent = 'ไม่สามารถโหลดไฟล์ที่จำเป็นได้: ' + missing.join(', ');
                    errorEl.classList.remove('hidden');
                }
                return false;
            }
            
            console.log('✅ All dependencies loaded successfully');
            return true;
        }
        
        // Wait for DOM and check dependencies
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🌟 DOM Content Loaded - Starting Saba-i Booking Board...');
            
            if (checkDependencies()) {
                try {
                    window.app = new SabaiBookingBoard();
                } catch (error) {
                    console.error('❌ Failed to initialize SabaiBookingBoard:', error);
                    
                    const errorEl = document.getElementById('errorMessage');
                    const errorText = document.querySelector('.error-text');
                    if (errorEl && errorText) {
                        errorText.textContent = 'ไม่สามารถเริ่มต้นแอปพลิเคชันได้: ' + error.message;
                        errorEl.classList.remove('hidden');
                    }
                }
            }
        });
    </script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="dataService.js"></script>
    <script src="calendarRenderer.js"></script>
    <script src="bookingManager.js"></script>
    <script src="app.js"></script>
    <script src="init-sample-data.js"></script>
</body>
</html>

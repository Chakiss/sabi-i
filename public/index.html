<body>

        <!-- Header -->

            <div class="header-compact">

                    <img src="icons/logo.jpg" alt="" class="brand-mark" aria-hidden="true">
                    <span>Saba-i Booking Board</span>

                        </button>
                        <span id="selectedDate" class="current-date">Loading...</span>
                        <button id="nextDay" class="nav-btn" aria-label="วันถัดไป">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>

                    <button id="settingsBtn" hidden aria-hidden="true" tabindex="-1"></button>

                        <div id="moreMenu" class="more-menu" role="menu" aria-labelledby="moreBtn" hidden>

                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                </span>
                                <span class="more-item-label">บันทึกภาพหน้าจอ</span>

                        <div class="skeleton-cell skeleton-time-col"></div>

        <!-- Booking Modal -->

                                    <option value="10">10%</option>

                            </div>

                                    <option value="scb">ไทยพาณิชย์ # 316-4-22005-3</option>

                            </div>

                    <button type="button" id="deleteBooking" class="btn btn-danger" style="display: none;">ลบ</button>
                    <button type="button" id="saveBooking" class="btn btn-primary">บันทึก</button>
                </div>
            </div>

    <!-- JavaScript -->
    <script>
        // Global error handler for debugging
        window.addEventListener('error', function(e) {
            console.error('🚨 Global JavaScript Error:', e.error);
            console.error('🔍 Error details:', {
                message: e.message,
                filename: e.filename,
                line: e.lineno,
                column: e.colno
            });
            
            // Show user-friendly error message
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.querySelector('.error-text');
            if (errorEl && errorText) {
                errorText.textContent = 'เกิดข้อผิดพลาดในการโหลดแอป: ' + e.message;
                errorEl.classList.remove('hidden');
            }
        });
        
        // Check if all required scripts are loaded before initializing app
        function checkDependencies() {
            const missing = [];
            
            if (typeof firebase === 'undefined') missing.push('Firebase');
            if (typeof CONFIG === 'undefined') missing.push('CONFIG');
            if (typeof db === 'undefined') missing.push('Database');
            if (typeof SabaiUtils === 'undefined') missing.push('SabaiUtils');
            if (typeof SabaiDataService === 'undefined') missing.push('SabaiDataService');
            if (typeof SabaiCalendarRenderer === 'undefined') missing.push('SabaiCalendarRenderer');
            if (typeof SabaiBookingManager === 'undefined') missing.push('SabaiBookingManager');
            
            if (missing.length > 0) {
                const error = `Missing dependencies: ${missing.join(', ')}`;
                console.error('❌ Dependency check failed:', error);
                
                const errorEl = document.getElementById('errorMessage');
                const errorText = document.querySelector('.error-text');
                if (errorEl && errorText) {
                    errorText.textContent = 'ไม่สามารถโหลดไฟล์ที่จำเป็นได้: ' + missing.join(', ');
                    errorEl.classList.remove('hidden');
                }
                return false;
            }
            
            console.log('✅ All dependencies loaded successfully');
            return true;
        }
        
        // Wait for DOM and check dependencies
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🌟 DOM Content Loaded - Starting Saba-i Booking Board...');
            
            if (checkDependencies()) {
                try {
                    window.app = new SabaiBookingBoard();
                } catch (error) {
                    console.error('❌ Failed to initialize SabaiBookingBoard:', error);
                    
                    const errorEl = document.getElementById('errorMessage');
                    const errorText = document.querySelector('.error-text');
                    if (errorEl && errorText) {
                        errorText.textContent = 'ไม่สามารถเริ่มต้นแอปพลิเคชันได้: ' + error.message;
                        errorEl.classList.remove('hidden');
                    }
                }
            }
        });
    </script>
    <!-- Header "more" menu: single button that proxies to the hidden action buttons -->
    <script>
    (function initMoreMenu() {
        document.addEventListener('DOMContentLoaded', () => {
            const moreBtn = document.getElementById('moreBtn');
            const moreMenu = document.getElementById('moreMenu');
            if (!moreBtn || !moreMenu) return;

            // Portal the menu out of the header so the header's z-index/stacking
            // context can't cap it — append to <body> at the end of the DOM.
            if (moreMenu.parentElement !== document.body) {
                document.body.appendChild(moreMenu);
            }

            const positionMenu = () => {
                const r = moreBtn.getBoundingClientRect();
                const margin = 8;
                // Anchor below the button, right-aligned to its right edge
                moreMenu.style.top = Math.round(r.bottom + margin) + 'px';
                // Measure menu to clamp inside the viewport
                const menuW = moreMenu.offsetWidth || 220;
                let left = Math.round(r.right - menuW);
                const minLeft = 8;
                const maxLeft = window.innerWidth - menuW - 8;
                if (left < minLeft) left = minLeft;
                if (left > maxLeft) left = maxLeft;
                moreMenu.style.left = left + 'px';
            };

            const open = () => {
                moreMenu.hidden = false;
                positionMenu();
                // Re-measure once layout settles (flex children may change width)
                requestAnimationFrame(positionMenu);
                moreBtn.setAttribute('aria-expanded', 'true');
                document.addEventListener('click', onOutside, true);
                document.addEventListener('keydown', onKey, true);
                window.addEventListener('resize', positionMenu);
                window.addEventListener('scroll', positionMenu, true);
            };
            const close = () => {
                moreMenu.hidden = true;
                moreBtn.setAttribute('aria-expanded', 'false');
                document.removeEventListener('click', onOutside, true);
                document.removeEventListener('keydown', onKey, true);
                window.removeEventListener('resize', positionMenu);
                window.removeEventListener('scroll', positionMenu, true);
            };
            const onOutside = (e) => {
                if (!moreMenu.contains(e.target) && e.target !== moreBtn && !moreBtn.contains(e.target)) {
                    close();
                }
            };
            const onKey = (e) => {
                if (e.key === 'Escape') { close(); moreBtn.focus(); }
            };

            moreBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (moreMenu.hidden) open(); else close();
            });

            moreMenu.addEventListener('click', (e) => {
                const item = e.target.closest('.more-item');
                if (!item) return;
                const action = item.dataset.action;
                const targetId = { notify: 'notifyBtn', capture: 'captureBtn', settings: 'settingsBtn' }[action];
                close();
                const target = targetId && document.getElementById(targetId);
                if (target) target.click();
            });

            // Mirror capture button busy state onto the moreBtn so users
            // still see a loading indicator while a screenshot is rendering.
            const captureBtn = document.getElementById('captureBtn');
            if (captureBtn && 'MutationObserver' in window) {
                const obs = new MutationObserver(() => {
                    const busy = captureBtn.disabled;
                    moreBtn.classList.toggle('is-busy', busy);
                    moreBtn.setAttribute('aria-busy', busy ? 'true' : 'false');
                });
                obs.observe(captureBtn, { attributes: true, attributeFilter: ['disabled'] });
            }

            // Mirror notification permission state onto the notify menu item
            // (fcm.js updates the hidden #notifyBtn's classes and title).
            const notifyBtn = document.getElementById('notifyBtn');
            const notifyItem = moreMenu.querySelector('.more-item[data-action="notify"]');
            if (notifyBtn && notifyItem && 'MutationObserver' in window) {
                const label = notifyItem.querySelector('.more-item-label');
                const syncNotify = () => {
                    const granted = notifyBtn.classList.contains('active');
                    const denied = notifyBtn.classList.contains('denied');
                    notifyItem.classList.toggle('is-active', granted);
                    notifyItem.classList.toggle('is-denied', denied);
                    if (label) {
                        label.textContent = denied
                            ? 'การแจ้งเตือนถูกบล็อก'
                            : granted
                                ? 'การแจ้งเตือนเปิดอยู่'
                                : 'เปิดการแจ้งเตือน';
                    }
                    if (notifyBtn.title) notifyItem.title = notifyBtn.title;
                };
                syncNotify();
                new MutationObserver(syncNotify).observe(notifyBtn, {
                    attributes: true, attributeFilter: ['class', 'title']
                });
            }
        });
    })();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Test - Saba-i</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Module Loading Test</h1>
    <div id="test-results"></div>

    <!-- Load all necessary scripts in correct order -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="dataService.js"></script>
    <script src="calendarRenderer.js"></script>  
    <script src="bookingManager.js"></script>
    
    <script>
        (function() {
            const results = document.getElementById('test-results');
            
            function appendResult(message, isPass) {
                const div = document.createElement('div');
                div.style.color = isPass ? 'green' : 'red';
                div.textContent = (isPass ? '✅ ' : '❌ ') + message;
                results.appendChild(div);
                console.log(message, isPass ? 'PASS' : 'FAIL');
            }
            
            // Test 1: Check Firebase
            appendResult('Firebase available', typeof firebase !== 'undefined');
            appendResult('CONFIG loaded', typeof CONFIG !== 'undefined');
            appendResult('Database initialized', typeof db !== 'undefined');
            
            // Test 2: Check modules
            appendResult('SabaiUtils loaded', typeof SabaiUtils !== 'undefined');
            appendResult('SabaiDataService loaded', typeof SabaiDataService !== 'undefined');
            appendResult('SabaiCalendarRenderer loaded', typeof SabaiCalendarRenderer !== 'undefined');
            appendResult('SabaiBookingManager loaded', typeof SabaiBookingManager !== 'undefined');
            
            // Test 3: Try to instantiate modules
            try {
                const dataService = new SabaiDataService();
                appendResult('SabaiDataService instantiation', true);
                
                const calendarRenderer = new SabaiCalendarRenderer(dataService);
                appendResult('SabaiCalendarRenderer instantiation', true);
                
                const bookingManager = new SabaiBookingManager(dataService, calendarRenderer);
                appendResult('SabaiBookingManager instantiation', true);
                
                console.log('All modules instantiated successfully');
                
            } catch (error) {
                appendResult('Module instantiation failed: ' + error.message, false);
                console.error('Module instantiation error:', error);
            }
            
            // Test 4: Try Firebase connection
            async function testFirebaseConnection() {
                try {
                    console.log('Testing Firebase connection...');
                    const snap = await db.collection('therapists').limit(1).get();
                    appendResult('Firebase connection successful', true);
                    console.log('Firebase test result:', snap);
                } catch (error) {
                    appendResult('Firebase connection failed: ' + error.message, false);
                    console.error('Firebase connection error:', error);
                }
            }
            
            // Run Firebase test
            testFirebaseConnection();
            
        })();
    </script>
</body>
</html>

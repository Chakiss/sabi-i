<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Fix Test - Saba-i</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Testing Error Fix</h1>
    <div id="test-status">Testing initialization...</div>
    <div id="detailed-log"></div>

    <!-- Load all scripts in order -->
    <script>
        // Enhanced error capture
        window.addEventListener('error', function(e) {
            console.error('💥 Global Error Caught:', e);
            document.getElementById('test-status').innerHTML = 
                '<div style="color: red;">❌ Error: ' + e.message + 
                '<br>📍 File: ' + e.filename + 
                '<br>📍 Line: ' + e.lineno + '</div>';
        });
        
        // Add promise rejection handler
        window.addEventListener('unhandledrejection', function(e) {
            console.error('💥 Unhandled Promise Rejection:', e);
            document.getElementById('test-status').innerHTML = 
                '<div style="color: red;">❌ Promise Rejection: ' + e.reason + '</div>';
        });
    </script>
    
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="dataService.js"></script>
    <script src="calendarRenderer.js"></script>
    <script src="bookingManager.js"></script>
    <script src="app.js"></script>
    
    <script>
        console.log('🧪 Starting comprehensive test...');
        
        function logToPage(message, type = 'info') {
            const logDiv = document.getElementById('detailed-log');
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'blue';
            logDiv.innerHTML += `<div style="color: ${color};">${message}</div>`;
            console.log(message);
        }
        
        async function comprehensiveTest() {
            try {
                logToPage('🚀 Testing app initialization...');
                
                // Check if dependencies are loaded
                const deps = [
                    { name: 'Firebase', obj: firebase },
                    { name: 'CONFIG', obj: CONFIG },
                    { name: 'db', obj: db },
                    { name: 'SabaiUtils', obj: SabaiUtils },
                    { name: 'SabaiDataService', obj: SabaiDataService },
                    { name: 'SabaiCalendarRenderer', obj: SabaiCalendarRenderer },
                    { name: 'SabaiBookingManager', obj: SabaiBookingManager },
                    { name: 'SabaiBookingBoard', obj: SabaiBookingBoard }
                ];
                
                for (const dep of deps) {
                    if (typeof dep.obj === 'undefined') {
                        throw new Error(`❌ ${dep.name} not loaded`);
                    }
                    logToPage(`✅ ${dep.name} loaded successfully`);
                }
                
                logToPage('🎯 Creating SabaiBookingBoard instance...');
                
                // Create app instance
                window.app = new SabaiBookingBoard();
                
                // Wait a bit for initialization
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                logToPage('🔍 Checking app state...');
                
                if (window.app) {
                    logToPage(`✅ App created successfully`);
                    logToPage(`📊 Therapists: ${window.app.therapists ? window.app.therapists.length : 'not loaded'}`);
                    logToPage(`📅 Bookings: ${window.app.bookings ? window.app.bookings.length : 'not loaded'}`);
                    logToPage(`🛠️ Services: ${window.app.services ? window.app.services.length : 'not loaded'}`);
                    logToPage(`⏰ Time slots: ${window.app.timeSlots ? window.app.timeSlots.length : 'not loaded'}`);
                    
                    // Test the specific problem that was causing issues
                    try {
                        if (window.app.therapists && Array.isArray(window.app.therapists)) {
                            const activeTherapists = window.app.therapists.filter(t => t.status === 'active');
                            logToPage(`✅ Therapists filter test passed: ${activeTherapists.length} active therapists`, 'success');
                        } else {
                            logToPage(`⚠️ Therapists not yet loaded, but no error thrown`, 'info');
                        }
                    } catch (error) {
                        logToPage(`❌ Therapists filter test failed: ${error.message}`, 'error');
                        throw error;
                    }
                    
                    document.getElementById('test-status').innerHTML = 
                        '<div style="color: green; font-size: 18px;">🎉 ALL TESTS PASSED! The error has been fixed.</div>';
                        
                } else {
                    throw new Error('App instance not created');
                }
                
            } catch (error) {
                logToPage(`💥 Test failed: ${error.message}`, 'error');
                document.getElementById('test-status').innerHTML = 
                    '<div style="color: red;">❌ Test Failed: ' + error.message + '</div>';
                throw error;
            }
        }
        
        // Run test when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            logToPage('📋 DOM loaded, starting tests in 1 second...');
            setTimeout(comprehensiveTest, 1000);
        });
    </script>
</body>
</html>

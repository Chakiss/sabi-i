<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Debug - Saba-i</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Simple Debug Test</h1>
    <p>Check the browser console (F12) for detailed messages...</p>
    <div id="status">Starting tests...</div>

    <!-- Load scripts -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="dataService.js"></script>
    
    <script>
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            document.getElementById('status').innerHTML = '<span style="color:red">❌ JavaScript Error: ' + e.message + '</span>';
        });
        
        async function runSimpleTest() {
            const statusEl = document.getElementById('status');
            
            try {
                statusEl.innerHTML = '🔍 Checking modules...';
                
                // Check basic modules
                if (typeof CONFIG === 'undefined') {
                    throw new Error('CONFIG not loaded');
                }
                
                if (typeof db === 'undefined') {
                    throw new Error('Firebase database not initialized');
                }
                
                if (typeof SabaiUtils === 'undefined') {
                    throw new Error('SabaiUtils not loaded');
                }
                
                if (typeof SabaiDataService === 'undefined') {
                    throw new Error('SabaiDataService not loaded');
                }
                
                statusEl.innerHTML = '✅ All modules loaded. Testing Firebase connection...';
                
                // Test Firebase
                const dataService = new SabaiDataService();
                const therapists = await dataService.getTherapists();
                
                statusEl.innerHTML = `✅ Success! Found ${therapists.length} therapists in database.`;
                console.log('Test successful, therapists:', therapists);
                
            } catch (error) {
                console.error('Test failed:', error);
                statusEl.innerHTML = `❌ Error: ${error.message}`;
            }
        }
        
        // Run test when DOM is ready
        document.addEventListener('DOMContentLoaded', runSimpleTest);
    </script>
</body>
</html>
